name: Scraper Ingestion Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install postgres

      - name: Run Multi-Provider Sync
        env:
          DATABASE_URL: "postgresql://postgres.ppwocgmumbdbvnqprxrg:Habibiendut1.@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require"
        run: |
          node scripts/gh_production_multi_sync.mjs
